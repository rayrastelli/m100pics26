kind = "web"
previewPath = "/"
title = "Photo Viewer"
version = "1.0.0"
id = "artifacts/photo-viewer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23117
name = "web"
paths = ["/"]

[services.development]
run = "npm run --workspace @workspace/photo-viewer dev"

[services.env]
PORT = "23117"
BASE_PATH = "/"

[services.production]
build = ["npm", "run", "--workspace", "@workspace/photo-viewer", "build"]
publicDir = "artifacts/photo-viewer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
